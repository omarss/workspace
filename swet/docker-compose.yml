services:
  postgres:
    image: postgres:18-alpine
    container_name: swet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: swet
      POSTGRES_PASSWORD: swet_local
      POSTGRES_DB: swet
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swet"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
