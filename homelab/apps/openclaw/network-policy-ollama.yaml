apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-allow-ollama
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: openclaw
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.42.0.1/32
      ports:
        - port: 11434
          protocol: TCP
