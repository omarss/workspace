apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw
spec:
  env:
    - name: OLLAMA_HOST
      value: "http://10.42.0.1:11434"
    - name: OLLAMA_API_KEY
      value: "ollama"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  security:
    networkPolicy:
      enabled: true
  config:
    raw:
      models:
        providers:
          ollama:
            baseUrl: "http://10.42.0.1:11434"
            apiKey: "ollama"
            api: "ollama"
            models:
              - id: "qwen3.5:4b"
                name: "Qwen 3.5 4B"
                reasoning: false
                input: ["text"]
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 }
                contextWindow: 32768
                maxTokens: 32768
      gateway:
        controlUi:
          allowedOrigins:
            - "https://claw.omarss.net"
      agents:
        defaults:
          model:
            primary: "ollama/qwen3.5:4b"
