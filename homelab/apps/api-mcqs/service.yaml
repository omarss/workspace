# NodePort 30802 so the host nginx reverse-proxy can reach the pod at
# http://127.0.0.1:30802 without an Ingress or LB. 30801 is taken by
# api-places; everyone downstream of nginx uses a different port.
apiVersion: v1
kind: Service
metadata:
  name: api-mcqs
  namespace: api-mcqs
  labels:
    app.kubernetes.io/name: api-mcqs
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: api-mcqs
  ports:
    - name: http
      port: 8000
      targetPort: http
      nodePort: 30802
      protocol: TCP
