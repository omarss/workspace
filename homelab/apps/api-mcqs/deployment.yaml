apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-mcqs
  namespace: api-mcqs
  labels:
    app.kubernetes.io/name: api-mcqs
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api-mcqs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-mcqs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Image is loaded into k3s's containerd via `make image-load`
          # from the mcqs repo. k3s sees `localhost/…` once imported.
          image: localhost/mcqs/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
          envFrom:
            - secretRef:
                name: api-mcqs-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /v1/mcq/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/mcq/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
