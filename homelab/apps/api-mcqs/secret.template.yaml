# TEMPLATE ONLY — do NOT `kubectl apply` this file directly (it would
# overwrite the live secret's real values with "REPLACE_ME"). It lives
# in git so whoever re-bootstraps the cluster knows which keys the
# api-mcqs Deployment expects.
#
# Create or rotate the real secret:
#
#   openssl rand -hex 32 > /tmp/mcqs-k
#   sudo k3s kubectl create namespace api-mcqs --dry-run=client -o yaml \
#     | sudo k3s kubectl apply -f -
#   sudo k3s kubectl -n api-mcqs create secret generic api-mcqs-secrets \
#     --from-literal=MCQS_API_KEY="$(cat /tmp/mcqs-k)" \
#     --from-literal=DATABASE_URL="postgresql://mcqs:<db-pass>@10.42.0.1:5432/mcqs" \
#     --dry-run=client -o yaml | sudo k3s kubectl apply -f -
#
# 10.42.0.1 is the default k3s host-gateway IP — the API reaches the
# host-resident Postgres through it. Verify with:
#   ip -4 addr show cni0 | awk '/inet /{print $2}'
#
# Postgres must allow connections from the 10.42.0.0/16 pod CIDR —
# add the following line to /etc/postgresql/*/main/pg_hba.conf if not
# already present, then `sudo systemctl reload postgresql`:
#   host  mcqs  mcqs  10.42.0.0/16  scram-sha-256
apiVersion: v1
kind: Secret
metadata:
  name: api-mcqs-secrets
  namespace: api-mcqs
type: Opaque
stringData:
  MCQS_API_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql://mcqs:REPLACE_ME@10.42.0.1:5432/mcqs"
