# TEMPLATE ONLY — do NOT `kubectl apply` this file directly (it would
# overwrite the live secret's real values with "REPLACE_ME"). It lives
# in git so whoever re-bootstraps the cluster knows which keys the
# api-places Deployment expects.
#
# To create or rotate the real secret, run (values live only in k8s):
#
#   openssl rand -hex 32 > /tmp/k && \
#   kubectl -n api-places create secret generic api-places-secrets \
#     --from-literal=GPLACES_API_KEY="$(cat /tmp/k)" \
#     --from-literal=DATABASE_URL="postgresql://gplaces:<db-pass>@10.42.0.1:5432/gplaces" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# `10.42.0.1` is the default k3s host-gateway IP — the API reaches the
# host-resident Postgres 18 through it. Verify the host address with:
#   ip -4 addr show cni0 | awk '/inet /{print $2}'
#
# Mirror the generated GPLACES_API_KEY into omono/local.properties as
# `gplaces.api.key` (see FEEDBACK.md §2).
apiVersion: v1
kind: Secret
metadata:
  name: api-places-secrets
  namespace: api-places
type: Opaque
stringData:
  GPLACES_API_KEY: "REPLACE_ME"
  DATABASE_URL: "postgresql://gplaces:REPLACE_ME@10.42.0.1:5432/gplaces"
