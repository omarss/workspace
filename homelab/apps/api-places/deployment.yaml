apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-places
  namespace: api-places
  labels:
    app.kubernetes.io/name: api-places
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: api-places
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-places
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          # Image is loaded into k3s's containerd via `make image-load` from
          # the gplaces_parser repo — no external registry.
          image: gplaces/api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: API_HOST
              value: "0.0.0.0"
            - name: API_PORT
              value: "8000"
          envFrom:
            - secretRef:
                name: api-places-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
