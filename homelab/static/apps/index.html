<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>apps.omarss.net</title>
    <style>
        :root {
            color-scheme: light dark;
            --bg: #f7f7f8;
            --fg: #1a1a1a;
            --muted: #6b6b73;
            --card-bg: #ffffff;
            --border: #e5e5ea;
            --accent: #0066ff;
            --accent-fg: #ffffff;
            --code-bg: #f0f0f3;
            --tag-feat: #0a7c2e;
            --tag-fix:  #b84a00;
            --tag-break: #c5283d;
            --tag-other: #555560;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0e0e10;
                --fg: #f0f0f3;
                --muted: #8a8a92;
                --card-bg: #18181b;
                --border: #2a2a30;
                --accent: #4a90ff;
                --accent-fg: #0e0e10;
                --code-bg: #1f1f24;
                --tag-feat: #4ade80;
                --tag-fix:  #fb923c;
                --tag-break: #f87171;
                --tag-other: #9ca3af;
            }
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            line-height: 1.55;
        }
        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 20px 80px;
        }
        header { margin-bottom: 36px; }
        h1 {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0 0 6px;
            letter-spacing: -0.02em;
        }
        header p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }
        header code {
            background: var(--code-bg);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .app {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 22px 24px;
            margin-bottom: 18px;
        }
        .app-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }
        .app-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.01em;
        }
        .app-version {
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .app-desc {
            margin: 6px 0 14px;
            color: var(--muted);
            font-size: 0.93rem;
        }
        .download {
            display: inline-block;
            background: var(--accent);
            color: var(--accent-fg);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: 8px;
            margin-bottom: 6px;
        }
        .download:hover { opacity: 0.92; }
        .meta {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 8px;
        }
        details {
            margin-top: 16px;
            border-top: 1px solid var(--border);
            padding-top: 14px;
        }
        details summary {
            cursor: pointer;
            color: var(--muted);
            font-size: 0.88rem;
            user-select: none;
        }
        details summary:hover { color: var(--fg); }
        .release {
            margin-top: 14px;
            padding-left: 14px;
            border-left: 2px solid var(--border);
        }
        .release-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            flex-wrap: wrap;
        }
        .release-version {
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-weight: 600;
            font-size: 0.92rem;
        }
        .release-date {
            color: var(--muted);
            font-size: 0.8rem;
        }
        .release-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
        }
        .release-link:hover { text-decoration: underline; }
        ul.changelog {
            margin: 8px 0 0;
            padding-left: 0;
            list-style: none;
        }
        ul.changelog li {
            font-size: 0.88rem;
            margin: 4px 0;
            display: flex;
            gap: 10px;
            align-items: baseline;
        }
        .tag {
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tag-feat   { background: rgba(34, 197, 94, 0.15); color: var(--tag-feat); }
        .tag-fix    { background: rgba(251, 146, 60, 0.15); color: var(--tag-fix); }
        .tag-break  { background: rgba(239, 68, 68, 0.18);  color: var(--tag-break); }
        .tag-other  { background: rgba(156, 163, 175, 0.18); color: var(--tag-other); }
        .empty, .error {
            background: var(--card-bg);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: var(--muted);
        }
        footer {
            margin-top: 40px;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }
        footer code {
            background: var(--code-bg);
            padding: 1px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>apps.omarss.net</h1>
        <p>Personal sideloaded Android apps. Add a download URL to <a href="https://github.com/ImranR98/Obtainium" target="_blank" rel="noreferrer">Obtainium</a> with source <em>Direct APK link</em>.</p>
    </header>

    <div id="apps">Loading…</div>

    <footer>
        Generated from <code>/manifest.json</code> · <span id="generated"></span>
    </footer>
</main>
<script>
const TAG_CLASS = { feat: 'tag-feat', fix: 'tag-fix', break: 'tag-break' };
const TAG_LABEL = { feat: 'feat', fix: 'fix', break: 'break', chore: 'chore', docs: 'docs', refactor: 'refactor', test: 'test', perf: 'perf', other: '' };

function fmtBytes(n) {
    if (n == null) return '';
    if (n < 1024) return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
}

function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toISOString().slice(0, 10);
}

function escape(s) {
    return String(s).replace(/[&<>"']/g, c =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
    );
}

function classify(line) {
    const m = line.match(/^(feat|fix|chore|docs|refactor|test|perf)(\(.+\))?(!)?:\s*(.*)$/);
    if (m) {
        const breaking = m[3] === '!';
        return { tag: breaking ? 'break' : m[1], text: m[4] };
    }
    if (/^break|^breaking change/i.test(line)) return { tag: 'break', text: line.replace(/^break(ing change)?:?\s*/i, '') };
    return { tag: 'other', text: line };
}

function renderRelease(rel) {
    const items = (rel.changelog || []).map(line => {
        const c = classify(line);
        const cls = TAG_CLASS[c.tag] || 'tag-other';
        const label = TAG_LABEL[c.tag] || '';
        const tagHtml = label ? `<span class="tag ${cls}">${escape(label)}</span>` : '';
        return `<li>${tagHtml}<span>${escape(c.text)}</span></li>`;
    }).join('');
    const link = rel.apk ? `<a class="release-link" href="/${escape(rel.apk)}">download</a>` : '';
    return `
        <div class="release">
            <div class="release-head">
                <span class="release-version">v${escape(rel.version)}</span>
                <span class="release-date">${escape(fmtDate(rel.released_at))} · ${escape(fmtBytes(rel.size_bytes))}</span>
                ${link}
            </div>
            ${items ? `<ul class="changelog">${items}</ul>` : ''}
        </div>
    `;
}

function renderApp(id, app) {
    const latest = app.latest || (app.releases && app.releases[0]) || {};
    const releases = app.releases || [];
    const older = releases.slice(1);
    const olderHtml = older.length
        ? `<details><summary>${older.length} older release${older.length === 1 ? '' : 's'}</summary>${older.map(renderRelease).join('')}</details>`
        : '';
    const latestApk = latest.apk || `${id}.latest.apk`;
    return `
        <article class="app">
            <div class="app-head">
                <h2 class="app-name">${escape(app.name || id)}</h2>
                <span class="app-version">v${escape(latest.version || '?')}</span>
            </div>
            ${app.description ? `<p class="app-desc">${escape(app.description)}</p>` : ''}
            <a class="download" href="/${escape(id)}.latest.apk">Download latest</a>
            <div class="meta">${escape(fmtBytes(latest.size_bytes))} · ${escape(fmtDate(latest.released_at))} · <a class="release-link" href="/${escape(latestApk)}">${escape(latestApk)}</a></div>
            ${releases.length ? `<details open><summary>${releases.length} release${releases.length === 1 ? '' : 's'}</summary>${releases.map(renderRelease).join('')}</details>` : ''}
        </article>
    `;
}

async function load() {
    const root = document.getElementById('apps');
    try {
        const res = await fetch('/manifest.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const apps = data.apps || {};
        const ids = Object.keys(apps).sort();
        if (ids.length === 0) {
            root.innerHTML = '<div class="empty">No apps published yet. Run <code>make release</code> from a project to publish here.</div>';
        } else {
            root.innerHTML = ids.map(id => renderApp(id, apps[id])).join('');
        }
        document.getElementById('generated').textContent = data.generated_at ? 'updated ' + fmtDate(data.generated_at) : '';
    } catch (err) {
        root.innerHTML = `<div class="error">Failed to load <code>/manifest.json</code>: ${escape(err.message)}</div>`;
    }
}

load();
</script>
</body>
</html>
