# Managed by certbot — this is the pre-certbot base config.
# After running certbot --nginx -d swet.omarss.net, certbot adds SSL directives.
server {
    listen 80;
    listen [::]:80;
    server_name swet.omarss.net;

    root /home/omar/workspace_personal/swet_cli/web/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /_app/immutable/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
