server {
    listen 80;
    listen [::]:80;
    server_name claw.omarss.net;

    # Basic auth
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd_claw;

    # Rate limiting zone (defined in nginx.conf http block)
    # Restrict to known IPs + LAN (optional, uncomment to whitelist)
    # allow 192.168.100.0/24;
    # deny all;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://10.43.238.195:18789;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
}
