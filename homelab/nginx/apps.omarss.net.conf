# Managed by certbot — this is the pre-certbot base config.
# After running: sudo certbot --nginx -d apps.omarss.net
# certbot will inject the TLS server block + 80 → 443 redirect alongside.
#
# Hosts personal sideloaded APKs for Obtainium pickup. Each app publishes
# two files at the doc root:
#   {app}.latest.apk        ← Obtainium "Direct APK link" target
#   {app}.{version}.apk     ← rollback / pinning
#
# Doc root is owned by user omar so `make publish` from any project can
# rsync straight in without sudo.

server {
    listen 80;
    listen [::]:80;
    server_name apps.omarss.net;

    root /srv/apps;
    index index.html;
    charset utf-8;

    server_tokens off;
    autoindex off;

    # Hard-fail on files over 60 MB — the current omono APK is ~14 MB
    # and anything much bigger is likely a mistake or abuse.
    client_max_body_size 60m;

    # NB: every location that adds its own header MUST re-include the
    # security snippet, because nginx's add_header has no inheritance
    # when a child context defines any add_header of its own.
    include /etc/nginx/snippets/apps-security-headers.conf;

    # ── Static assets ────────────────────────────────────────────────────
    location /assets/ {
        include /etc/nginx/snippets/apps-security-headers.conf;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        try_files $uri =404;
    }

    location /icons/ {
        include /etc/nginx/snippets/apps-security-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ── APKs ─────────────────────────────────────────────────────────────
    location ~* \.apk$ {
        include /etc/nginx/snippets/apps-security-headers.conf;
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment" always;
        # Long-lived cache for versioned files; latest is short-lived so
        # Obtainium picks up new releases promptly.
        if ($request_filename ~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
        if ($request_filename !~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }

    # ── Manifest ─────────────────────────────────────────────────────────
    location = /manifest.json {
        include /etc/nginx/snippets/apps-security-headers.conf;
        default_type application/json;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
    }

    # ── Index & fall-through ─────────────────────────────────────────────
    location = /index.html {
        include /etc/nginx/snippets/apps-security-headers.conf;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Dotfiles and rsync metadata are never served.
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/apps.omarss.net.access.log;
    error_log /var/log/nginx/apps.omarss.net.error.log;
}
