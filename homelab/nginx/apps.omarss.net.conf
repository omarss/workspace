# Managed by certbot — this is the pre-certbot base config.
# After running: sudo certbot --nginx -d apps.omarss.net
# certbot will inject the TLS server block + 80 → 443 redirect alongside.
#
# Hosts personal sideloaded APKs for Obtainium pickup. Each app publishes
# two files at the doc root:
#   {app}.latest.apk        ← Obtainium "Direct APK link" target
#   {app}.{version}.apk     ← rollback / pinning
#
# Doc root is owned by user omar so `make publish` from any project can
# rsync straight in without sudo.

server {
    listen 80;
    listen [::]:80;
    server_name apps.omarss.net;

    root /srv/apps;
    index index.html;
    charset utf-8;

    server_tokens off;
    autoindex off;

    # Hard-fail on files over 60 MB — the current omono APK is ~14 MB
    # and anything much bigger is likely a mistake or abuse.
    client_max_body_size 60m;

    # ── Security headers (applied to all responses, incl. errors) ────────
    # HSTS: 1 year, subdomains, preload-eligible.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: no 'unsafe-inline' anywhere. All CSS/JS is served from /assets.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ── Static assets ────────────────────────────────────────────────────
    location /assets/ {
        # Short cache so style/JS edits land fast, but still cacheable.
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    location /icons/ {
        add_header Cache-Control "public, max-age=3600" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        try_files $uri =404;
    }

    # ── APKs ─────────────────────────────────────────────────────────────
    location ~* \.apk$ {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Long-lived cache for versioned files; latest is short-lived so
        # Obtainium picks up new releases promptly.
        if ($request_filename ~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
        if ($request_filename !~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }

    # ── Manifest ─────────────────────────────────────────────────────────
    location = /manifest.json {
        default_type application/json;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Index & fall-through ─────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Dotfiles and rsync metadata are never served.
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /var/log/nginx/apps.omarss.net.access.log;
    error_log /var/log/nginx/apps.omarss.net.error.log;
}
