# Managed by certbot — this is the pre-certbot base config.
# After running: sudo certbot --nginx -d apps.omarss.net
# certbot will inject the TLS server block + 80 → 443 redirect alongside.
#
# Hosts personal sideloaded APKs for Obtainium pickup. Each app publishes
# two files at the doc root:
#   {app}.latest.apk        ← Obtainium "Direct APK link" target
#   {app}.{version}.apk     ← rollback / pinning
#
# Doc root is owned by user omar so `make publish` from any project can
# rsync straight in without sudo.

server {
    listen 80;
    listen [::]:80;
    server_name apps.omarss.net;

    root /srv/apps;
    index index.html;
    charset utf-8;

    # autoindex off because index.html + manifest.json drive the public
    # listing dynamically. The HTML page fetches /manifest.json and
    # renders the apps + release history client-side.
    autoindex off;

    # Don't serve dotfiles / hidden dirs (rsync metadata, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.apk$ {
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment";
        add_header X-Content-Type-Options "nosniff";
        # Long-lived cache for versioned files; latest is short-lived so
        # Obtainium picks up new releases promptly.
        if ($request_filename ~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=300, must-revalidate";
        }
        if ($request_filename !~* "\.latest\.apk$") {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Manifest is read on every page load by index.html; keep the cache
    # tight so a new publish shows up on the next refresh.
    location ~* \.json$ {
        default_type application/json;
        add_header Cache-Control "public, max-age=60, must-revalidate";
    }

    # The index page itself — short cache so style/JS edits land fast.
    location = /index.html {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Default: serve index.html at /, otherwise try the literal file,
    # otherwise 404. Anything that isn't .apk / .json / index.html is
    # blocked by this fallthrough.
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    access_log /var/log/nginx/apps.omarss.net.access.log;
    error_log /var/log/nginx/apps.omarss.net.error.log;
}
