# Managed by certbot — this is the pre-certbot base config.
# After `make apply-nginx` run: sudo certbot --nginx -d api.omarss.net
# certbot will inject the TLS server block + 80 → 443 redirect alongside.
#
# General personal API host. Each first-level path routes to a different
# k3s service. Currently wired:
#   /v1/places        → api-places service (NodePort 30801), gplaces_parser
#
# Auth is enforced by each upstream app (X-Api-Key for api-places).

server {
    listen 80;
    listen [::]:80;
    server_name api.omarss.net;

    server_tokens off;
    charset utf-8;

    client_max_body_size 16k;
    client_body_timeout  5s;

    # gplaces — omono client calls GET /v1/places
    location /v1/places {
        proxy_pass http://127.0.0.1:30801/v1/places;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout    8s;
        proxy_send_timeout    4s;
    }

    # roads — same pod, different route. Point-in-polygon query can visit
    # ~40 candidates per request so we give it a little more headroom.
    location /v1/roads {
        proxy_pass http://127.0.0.1:30801/v1/roads;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout    12s;
        proxy_send_timeout    4s;
    }

    # search — keyword + fuzzy over places. GIN + trigram, typical response
    # under 50 ms even at 14k rows.
    location /v1/search {
        proxy_pass http://127.0.0.1:30801/v1/search;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout    8s;
        proxy_send_timeout    4s;
    }

    # Health probes for api-places (used by k8s and external monitoring)
    location = /v1/health {
        proxy_pass http://127.0.0.1:30801/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 1s;
        proxy_read_timeout    2s;
    }

    # Anything else gets a plain 404 — the host has no other endpoints yet.
    location / {
        return 404;
    }

    access_log /var/log/nginx/api.omarss.net.access.log;
    error_log  /var/log/nginx/api.omarss.net.error.log;
}
