# Managed by certbot — this is the pre-certbot base config.
# After running certbot --nginx -d sync.omarss.net, certbot adds SSL directives.
# NOTE: proxy_pass uses CouchDB ClusterIP. If service is recreated, update the IP
# or switch to a NodePort service.
server {
    listen 80;
    listen [::]:80;
    server_name sync.omarss.net;

    location / {
        proxy_pass http://10.43.134.42:5984;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 0;
    }
}
