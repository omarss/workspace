version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - revive
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes:
        - G404 # math/rand acceptable for non-crypto paths

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/omarss/ivr
